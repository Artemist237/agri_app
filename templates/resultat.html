{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0 rounded-4">

                <div class="card-header bg-success bg-opacity-10 border-0 pt-4 pb-0 text-center">
                    <div class="display-1 text-success mb-2">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h2 class="h3 card-title text-success font-weight-bold">Analyse Terminée</h2>
                </div>

                <div class="card-body p-5 text-center">
                    <p class="text-muted mb-1">Pour votre culture de :</p>
                    <h3 class="h2 mb-4 text-dark font-weight-bold text-capitalize">{{ culture }}</h3>

                    <hr class="my-4 w-25 mx-auto text-muted opacity-25">

                    <p class="text-muted mb-2">Rendement moyen calculé</p>
                    <div class="mb-2">
                        <span class="display-3 text-success font-weight-bold">{{ rendement }}</span>
                        <span class="h3 text-success font-weight-normal ms-1">T/ha</span>
                    </div>

                    <div class="d-inline-flex align-items-center border rounded-pill px-3 py-1 bg-light mt-2 mb-5">
                        <i class="fas fa-info-circle text-muted me-2"></i>
                        <span class="text-muted small">Basé sur la surface déclarée.</span>
                    </div>

                    <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                        <a href="/analyse" class="btn btn-lg btn-outline-success rounded-pill px-4">
                            <i class="fas fa-redo me-2"></i>Nouvelle analyse
                        </a>
                        <a href="/dashboard" class="btn btn-lg btn-success rounded-pill px-4 shadow-sm">
                            <i class="fas fa-chart-line me-2"></i>Aller au Dashboard
                        </a>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/dashboard" class="text-muted text-decoration-none small">
                    <i class="fas fa-arrow-left me-1"></i>Retour rapide
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
