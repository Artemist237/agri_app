<!DOCTYPE html>
<html>
<head>
    <title>Parcelles</title>
</head>

<body>

<h2>Liste des parcelles</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Localisation</th>
    </tr>

    {% for p in parcelles %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
    </tr>
    {% endfor %}

</table>

<a href="/dashboard">Retour</a>

</body>
</html>
