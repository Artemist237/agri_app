<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.1">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Agri App</title>
</head>
<body>

    <div class="sidebar">
        <h4 class="text-center py-3 text-white">Agri App</h4>
        <hr class="text-white">
        <a href="{{ url_for('dashboard') }}"><i class="fas fa-th-large me-2"></i>Dashboard</a>
        <a href="{{ url_for('analyse') }}"><i class="fas fa-chart-line me-2"></i>Analyse</a>
        <a href="{{ url_for('ajouter') }}"><i class="fas fa-plus-circle me-2"></i>Ajouter</a>
        <hr class="text-white mt-5">
        <a href="{{ url_for('login') }}" class="text-danger"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
