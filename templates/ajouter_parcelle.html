{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-success text-white text-center py-4 rounded-top-4">
                    <h3 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Nouvelle Parcelle</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Localisation</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-map-marker-alt text-success"></i></span>
                                <input type="text" name="localisation" class="form-control form-control-lg" placeholder="Ex: Zone Nord - Secteur A" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Nom de la culture</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-seedling text-success"></i></span>
                                <input type="text" name="nom_culture" class="form-control form-control-lg" placeholder="Ex: Maïs, Blé, Soja..." required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Rendement estimé (T/ha)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-chart-line text-success"></i></span>
                                <input type="number" step="0.01" name="rendement" class="form-control form-control-lg" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-lg rounded-pill shadow">
                                Enregistrer la parcelle
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="{{ url_for('dashboard') }}" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-1"></i>Annuler et retourner au dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
