{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card border-0 shadow-sm p-4 rounded-4">
                <h2 class="text-center mb-4 fw-bold">Connexion</h2>
                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Utilisateur" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Mot de passe" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 mt-3">Se connecter</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
